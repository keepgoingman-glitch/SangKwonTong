<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>상권통</title>

  <!-- PWA (홈 화면 저장) -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0B4FCB" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="상권통" />
  <!-- apple-touch-icon은 화면별로(직원/고객) JS가 동적 지정 -->

  <!-- OG / 공유 미리보기 -->
  <meta property="og:title" content="상권통" />
  <meta property="og:description" content="우리 동네 혜택 한눈에 · KT 상권통" />
  <meta property="og:image" content="/icon-512.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0b1220; overflow-x: hidden; }
    #root { min-height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // 서비스 워커 등록 — 안드로이드 '앱 설치' 활성화에 필요
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {})
      })
    }
  </script>
</body>
</html>
